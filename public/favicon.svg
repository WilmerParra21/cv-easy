<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d32f2f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8a8a92;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Document background -->
  <rect x="24" y="20" width="144" height="160" rx="12" fill="#ffffff" stroke="#d32f2f" stroke-width="3"/>
  <!-- Red accent bar -->
  <rect x="24" y="20" width="144" height="12" rx="12" fill="#d32f2f"/>
  <!-- Text lines -->
  <rect x="36" y="50" width="120" height="4" rx="2" fill="#d32f2f" opacity="0.8"/>
  <rect x="36" y="62" width="100" height="3" rx="1.5" fill="#cccccc"/>
  <rect x="36" y="72" width="95" height="3" rx="1.5" fill="#cccccc"/>
  <!-- Gradient arrow -->
  <g transform="translate(140, 110)">
    <path d="M 0 0 L 20 0 L 10 -15 Z" fill="url(#grad)" stroke="#333" stroke-width="1"/>
  </g>
</svg>
